<?xml version="1.0" encoding="UTF-8"?>
<svg width="480" height="140" viewBox="0 0 480 140"
     xmlns="http://www.w3.org/2000/svg"
     role="img" aria-label="AProver – Agentic Prover">

  <!-- Icon badge -->
  <rect x="2" y="10" width="116" height="120" rx="20"
        fill="#1a1040" stroke="#4338ca" stroke-width="1.5"/>

  <!--
    Iceberg "A":

       ●          ← apex dot (the single visible tip)
      ╱╲
     ╱  ╲   bright   ← TIP: above the waterline, full opacity
    ╱    ╲
   ══════════      ← waterline (white bar)
  ╱        ╲
 ╱  muted   ╲  ← BODY: below the waterline, low opacity
╱____________╲

    Left half = violet (LLM / spec-gen)
    Right half = green  (BMC / formal checker)
    The small bright tip is the visible "proved result";
    the large muted body is all the hidden work underneath.
  -->

  <!-- ── BODY (below waterline) – same hues, muted ── -->
  <polygon points="39,76 60,76 60,114 8,114"   fill="#a78bfa" opacity="0.35"/>
  <polygon points="60,76 82,76 112,114 60,114" fill="#4ade80" opacity="0.35"/>

  <!-- ── WATERLINE ── -->
  <line x1="30" y1="76" x2="90" y2="76"
        stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>

  <!-- ── TIP (above waterline) – bright, full opacity ── -->
  <polygon points="60,22 39,76 60,76" fill="#a78bfa"/>
  <polygon points="60,22 60,76 82,76" fill="#4ade80"/>

  <!-- Apex dot – the single point visible above the surface -->
  <circle cx="60" cy="22" r="6" fill="#ffffff"/>

  <!-- Wordmark -->
  <text x="140" y="85"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="50" font-weight="700"
        fill="#1e1b4b" letter-spacing="-1.5">AProver</text>

  <!-- Tagline -->
  <text x="142" y="108"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="500"
        fill="#6366f1" letter-spacing="4.5">AGENTIC PROVER</text>

</svg>
